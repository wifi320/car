<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سباق السيارات</title>
    <style>
        * { margin: 0; padding: 0; box- 心izing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #333; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #gameArea { width: 400px; height: 100vh; background: #222; position: relative; border-left: 5px dashed #fff; border-right: 5px dashed #fff; overflow: hidden; }
        .car { width: 50px; height: 80px; background: red; position: absolute; bottom: 20px; left: 175px; border-radius: 10px; transition: 0.1s; z-index: 10; }
        .enemy { width: 50px; height: 80px; background: blue; position: absolute; border-radius: 10px; z-index: 5; }
        .line { width: 10px; height: 100px; background: white; position: absolute; left: 195px; }
        #score { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        #startScreen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <div id="score">النتيجة: 0</div>
    <div id="startScreen">انقر هنا لبدء اللعبة<br>استخدم الأسهم للتحرك</div>
    <div id="gameArea"></div>

    <script>
        const score = document.querySelector('#score');
        const startScreen = document.querySelector('#startScreen');
        const gameArea = document.querySelector('#gameArea');

        let player = { speed: 5, score: 0 };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        startScreen.addEventListener('click', start);
        document.addEventListener('keydown', (e) => { keys[e.key] = true; });
        document.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function isCollide(a, b) {
            aRect = a.getBoundingClientRect();
            bRect = b.getBoundingClientRect();
            return !((aRect.bottom < bRect.top) || (aRect.top > bRect.bottom) || (aRect.right < bRect.left) || (aRect.left > bRect.right));
        }

        function moveLines() {
            let lines = document.querySelectorAll('.line');
            lines.forEach(function(item) {
                if (item.y >= 700) { item.y -= 750; }
                item.y += player.speed;
                item.style.top = item.y + "px";
            });
        }

        function endGame() {
            player.start = false;
            startScreen.classList.remove('hide');
            startScreen.innerHTML = "انتهت اللعبة! <br> نتيجتك النهائية هي: " + player.score + "<br> انقر هنا لإعادة المحاولة";
            startScreen.style.display = "block";
        }

        function moveEnemy(car) {
            let enemies = document.querySelectorAll('.enemy');
            enemies.forEach(function(item) {
                if (isCollide(car, item)) {
                    endGame();
                }
                if (item.y >= 750) {
                    item.y = -300;
                    item.style.left = Math.floor(Math.random() * 350) + "px";
                }
                item.y += player.speed;
                item.style.top = item.y + "px";
            });
        }

        function gamePlay() {
            let car = document.querySelector('.car');
            let road = gameArea.getBoundingClientRect();

            if (player.start) {
                moveLines();
                moveEnemy(car);

                if (keys.ArrowUp && player.y > (road.top + 70)) { player.y -= player.speed; }
                if (keys.ArrowDown && player.y < (road.bottom - 85)) { player.y += player.speed; }
                if (keys.ArrowLeft && player.x > 0) { player.x -= player.speed; }
                if (keys.ArrowRight && player.x < (road.width - 50)) { player.x += player.speed; }

                car.style.top = player.y + "px";
                car.style.left = player.x + "px";

                window.requestAnimationFrame(gamePlay);
                player.score++;
                score.innerText = "النتيجة: " + player.score;
            }
        }

        function start() {
            startScreen.style.display = "none";
            gameArea.innerHTML = "";
            player.start = true;
            player.score = 0;
            
            for (x = 0; x < 5; x++) {
                let roadLine = document.createElement('div');
                roadLine.setAttribute('class', 'line');
                roadLine.y = (x * 150);
                roadLine.style.top = roadLine.y + "px";
                gameArea.appendChild(roadLine);
            }

            let car = document.createElement('div');
            car.setAttribute('class', 'car');
            gameArea.appendChild(car);

            player.x = car.offsetLeft;
            player.y = car.offsetTop;

            for (x = 0; x < 3; x++) {
                let enemyCar = document.createElement('div');
                enemyCar.setAttribute('class', 'enemy');
                enemyCar.y = ((x + 1) * 350) * -1;
                enemyCar.style.top = enemyCar.y + "px";
                enemyCar.style.left = Math.floor(Math.random() * 350) + "px";
                gameArea.appendChild(enemyCar);
            }

            window.requestAnimationFrame(gamePlay);
        }
    </script>
</body>
</html>
